[project]
name = "manga-translator-ui"
version = "2.2.0"
description = "Desktop and web UI for manga-image-translator"
requires-python = "==3.12.*"
dependencies = [
  # pydensecrf - 按平台选择安装来源
  "pydensecrf @ https://github.com/hgmzhn/manga-translator-ui/releases/download/v1.7.6/pydensecrf-1.0-cp312-cp312-win_amd64.whl ; sys_platform == 'win32'",
  "pydensecrf @ https://github.com/WeMingT/pydensecrf/releases/download/v1.0.0-ubuntu24.04-cp312/pydensecrf-1.0-cp312-cp312-linux_x86_64.whl ; sys_platform == 'linux' and platform_machine == 'x86_64' and python_version == '3.12'",
  "pydensecrf @ git+https://github.com/lucasb-eyer/pydensecrf.git ; sys_platform == 'linux' and (platform_machine != 'x86_64' or python_version != '3.12')",
  "pydensecrf @ https://github.com/hgmzhn/pydensecrf/releases/download/v1.0.0/pydensecrf-1.0-cp312-cp312-macosx_10_13_universal2.whl ; sys_platform == 'darwin'",
  "pydensecrf @ git+https://github.com/lucasb-eyer/pydensecrf.git ; sys_platform != 'win32' and sys_platform != 'linux' and sys_platform != 'darwin'",
]

